<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Password Reset</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            /* gray for unmet */
            --ok: #10b981;
            /* green for met */
            --border: #e5e7eb;
            --accent: #4f46e5;
        }

        * {
            box-sizing: border-box;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
            padding: 28px;
            margin: auto;
        }

        .title {
            margin: 0 0 4px;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .subtitle {
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 0.94rem;
        }

        .field {
            margin: 14px 0;
        }

        .label {
            display: block;
            font-size: 0.92rem;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .input-wrap {
            position: relative;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            background: #fff;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
        }

        .toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            font-size: 0.85rem;
            color: var(--muted);
            cursor: pointer;
            padding: 4px 6px;
        }

        .btn {
            width: 100%;
            margin-top: 14px;
            padding: 12px 14px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            background: var(--accent);
            color: #fff;
            transition: filter .2s, opacity .2s;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(0.2);
        }

        .reqs {
            margin: 14px 0 0;
            padding-left: 0;
            list-style: none;
            font-size: 0.92rem;
        }

        .reqs li {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            margin: 8px 0;
        }

        .reqs li .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--muted);
            flex: 0 0 9px;
            transform: translateY(1px);
        }

        .reqs li.met {
            color: var(--ok);
        }

        .reqs li.met .dot {
            background: var(--ok);
        }

        .helper {
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <div class="card-container">
        <main class="card" role="main" aria-labelledby="title">
            <h1 id="title" class="title">Reset your password</h1>
            <p class="subtitle">Choose a strong password and confirm it below.</p>

            <form id="resetForm" novalidate>
                <div class="field">
                    <label class="label" for="newPassword">New password</label>
                    <div class="input-wrap">
                        <input id="newPassword" name="newPassword" type="password" autocomplete="new-password"
                            required />
                        <button type="button" class="toggle" aria-label="Show password"
                            data-target="newPassword">Show</button>
                    </div>
                    <div class="helper" id="pwHelper" aria-live="polite"></div>
                </div>

                <div class="field">
                    <label class="label" for="confirmPassword">Confirm password</label>
                    <div class="input-wrap">
                        <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password"
                            required />
                        <button type="button" class="toggle" aria-label="Show password"
                            data-target="confirmPassword">Show</button>
                    </div>
                </div>

                <button id="submitBtn" class="btn" type="submit" disabled>Update password</button>

                <ul id="requirementsList" class="reqs" aria-live="polite"></ul>
            </form>
        </main>
    </div>

    <script>
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const id = urlParams.get('id');
        const token = urlParams.get('token');

    </script>

    <script>
        // Given requirements (text preserved exactly as requested)
        const requirements = [
            { key: "length", text: "The password must contain at least 8 characters" },
            { key: "upper", text: "The password must contain at least one capital letter" },
            { key: "lower", text: "The password must contain at least one lowercase letter" },
            { key: "number", text: "The password must contain at least one number" },
            { key: "special", text: "The password must contain at least one special character" },
            { key: "match", text: "Passwords must be the same" },
        ];

        const els = {
            form: document.getElementById('resetForm'),
            newPw: document.getElementById('newPassword'),
            confirmPw: document.getElementById('confirmPassword'),
            submit: document.getElementById('submitBtn'),
            reqs: document.getElementById('requirementsList'),
            helper: document.getElementById('pwHelper'),
            toggles: document.querySelectorAll('.toggle')
        };

        // Render requirements list
        const liMap = new Map();
        requirements.forEach(r => {
            const li = document.createElement('li');
            li.dataset.key = r.key;
            li.innerHTML = `<span class="dot" aria-hidden="true"></span><span>${r.text}</span>`;
            els.reqs.appendChild(li);
            liMap.set(r.key, li);
        });

        // Validation logic
        function evaluate(password, confirm) {
            const result = {
                length: password.length >= 8,
                upper: /[A-Z]/.test(password),
                lower: /[a-z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[^A-Za-z0-9]/.test(password), // any non-alphanumeric counts as special
                match: password.length > 0 && password === confirm
            };
            return result;
        }

        function updateUI() {
            const pw = els.newPw.value || "";
            const c = els.confirmPw.value || "";
            const status = evaluate(pw, c);

            // Update each requirement color/state
            Object.entries(status).forEach(([key, met]) => {
                const li = liMap.get(key);
                if (!li) return;
                li.classList.toggle('met', met);
            });

            // Helper text (optional)
            els.helper.textContent = pw.length && !status.length
                ? "Use at least 8 characters."
                : "";

            // Enable/disable button
            const allGood = Object.values(status).every(Boolean);
            els.submit.disabled = !allGood;
        }

        els.newPw.addEventListener('input', updateUI);
        els.confirmPw.addEventListener('input', updateUI);

        // Simple password visibility toggles
        els.toggles.forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-target');
                const input = document.getElementById(id);
                const isHidden = input.type === 'password';
                input.type = isHidden ? 'text' : 'password';
                btn.textContent = isHidden ? 'Hide' : 'Show';
                btn.setAttribute('aria-label', (isHidden ? 'Hide' : 'Show') + ' password');
            });
        });

        // Prevent actual submit for demo; swap with your real handler
        els.form.addEventListener('submit', (e) => {
            e.preventDefault();

            const password = els.newPw.value;

            const item = {
                id: id,
                password: password
            };

            // Disable button to prevent multiple submissions
            els.submit.disabled = true;
            els.submit.textContent = 'Updating...';

            fetch('https://chairy-backend-74207e637f70.herokuapp.com/api/v1/userUpdatePassword', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token
                },
                body: JSON.stringify(item),
            })
                .then(async response => {
                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.message || 'Something went wrong. Please try again.');
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.success) {
                        if (data.type == 'success') {
                            document.querySelector('.card').innerHTML = `<h1 class="title">Success!</h1><p class="subtitle">Your password has been updated. You can now close this page.</p>`;
                        } else {
                            alert(data.message);
                        }
                    } else {
                        els.submit.disabled = false; // Re-enable button on failure
                        alert('Something went wrong. Please try again.');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Reset link expired, please generate a new one');
                    els.submit.disabled = false; // Re-enable button on failure
                    els.submit.textContent = 'Update password';
                });
        });

        // Initialize UI once on load
        updateUI();
    </script>




</body>

</html>
