<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Payout setup completed</title>

  <style>
    :root{
      --bg0:#f6f9fc;
      --bg1:#eef2ff;
      --card:#ffffff;
      --text:#0a2540;
      --muted:#5b6b7a;
      --border:rgba(10,37,64,.12);
      --shadow:0 16px 48px rgba(0,0,0,.08);
      --primary:#635bff;
      --primaryDark:#4b44ff;
      --success:#00d924;
      --radius:18px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--text);
      background:
        radial-gradient(900px 400px at 10% -10%, rgba(99,91,255,.18), transparent 60%),
        radial-gradient(900px 400px at 90% 0%, rgba(0,217,36,.12), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .wrap{width:100%; max-width:720px}

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:16px;
      font-weight:600;
      font-size:14px;
      color:rgba(10,37,64,.85);
    }

    .logo{
      width:28px;height:28px;border-radius:8px;
      background: linear-gradient(135deg, rgba(99,91,255,.95), rgba(99,91,255,.55));
      box-shadow: 0 8px 24px rgba(99,91,255,.24);
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:28px;
      text-align:center;
    }

    .check{
      width:56px;height:56px;
      border-radius:16px;
      margin:0 auto 16px;
      background: rgba(0,217,36,.14);
      border:1px solid rgba(0,217,36,.28);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .check svg{
      width:28px;height:28px;
      color:var(--success);
    }

    h1{
      margin:0 0 8px;
      font-size:22px;
      letter-spacing:-.2px;
    }

    p{
      margin:0;
      font-size:15px;
      color:var(--muted);
      line-height:1.6;
    }

    .actions{
      margin-top:22px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      border-radius:14px;
      padding:12px 16px;
      font-weight:600;
      font-size:14px;
      text-decoration:none;
      cursor:pointer;
      border:1px solid transparent;
    }

    .btn-primary{
      color:#fff;
      background: linear-gradient(180deg, var(--primary), var(--primaryDark));
      box-shadow: 0 12px 28px rgba(99,91,255,.25);
    }

    .btn-ghost{
      color:rgba(10,37,64,.9);
      background:#fff;
      border-color:var(--border);
    }

    .footer{
      margin-top:18px;
      font-size:12px;
      color:rgba(10,37,64,.55);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="brand">
      <div class="logo"></div>
      <div>Payout setup</div>
    </div>

    <div class="card" role="main">
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M5 12l4 4L19 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <h1>Stripe setup finished</h1>

      <p>
        You’ve completed the Stripe payout setup process.
        <br />
        Please return to the app to check whether your bank account is fully linked and ready to receive payouts.
      </p>

      <div class="actions">
        <!-- Change this to your real app route -->
        <a href="/" class="btn btn-primary">
          Go back to the app →
        </a>

        <a href="/" class="btn btn-ghost">
          Go to homepage
        </a>
      </div>

      <div class="footer">
        Secure onboarding • Powered by Stripe Connect
      </div>
    </div>
  </div>
</body>
</html>
